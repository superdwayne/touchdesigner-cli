<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TD-CLI — Generative Art Experience</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'SF Mono','Fira Code',monospace;color:#fff;height:100dvh}
canvas#main{position:fixed;inset:0;z-index:0}
canvas#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

.hud{position:fixed;z-index:10;pointer-events:none}
.hud *{pointer-events:auto}

.top-bar{top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:0.5}
.logo span{color:#a855f7;font-weight:700}

.controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;padding:10px 18px;border-radius:40px;
    font-size:11px;font-family:inherit;cursor:pointer;
    transition:all .2s;white-space:nowrap;
}
.ctrl-btn:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.4);transform:translateY(-2px)}
.ctrl-btn.active{background:rgba(168,85,247,0.3);border-color:#a855f7}

.param-panel{
    position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:10;
    display:flex;flex-direction:column;gap:20px;
}
.param-slider{display:flex;flex-direction:column;align-items:center;gap:6px}
.param-slider label{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:0.4;writing-mode:vertical-lr;transform:rotate(180deg)}
.param-slider input[type=range]{
    -webkit-appearance:none;width:120px;height:3px;background:rgba(255,255,255,0.1);
    border-radius:2px;outline:none;transform:rotate(-90deg);
}
.param-slider input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:#a855f7;cursor:pointer;border:2px solid #000;
}

.info-overlay{
    position:fixed;left:20px;bottom:80px;z-index:10;
    font-size:10px;opacity:0.3;line-height:1.8;
}

.mode-label{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:0.6;
    transition:opacity .5s;
}
</style>
</head>
<body>

<canvas id="main"></canvas>
<canvas id="particles"></canvas>

<div class="hud top-bar">
    <div class="logo"><span>TD-CLI</span> Generative</div>
</div>

<div class="mode-label" id="mode-label">Noise Field</div>

<div class="param-panel">
    <div class="param-slider">
        <input type="range" id="p-speed" min="0" max="100" value="30">
        <label>Speed</label>
    </div>
    <div class="param-slider">
        <input type="range" id="p-complexity" min="1" max="100" value="40">
        <label>Complexity</label>
    </div>
    <div class="param-slider">
        <input type="range" id="p-intensity" min="0" max="100" value="60">
        <label>Intensity</label>
    </div>
    <div class="param-slider">
        <input type="range" id="p-color" min="0" max="100" value="50">
        <label>Hue</label>
    </div>
</div>

<div class="controls">
    <button class="ctrl-btn active" onclick="setMode('noise')">Noise Field</button>
    <button class="ctrl-btn" onclick="setMode('feedback')">Feedback Loop</button>
    <button class="ctrl-btn" onclick="setMode('particles')">Particle Storm</button>
    <button class="ctrl-btn" onclick="setMode('waves')">Wave Interference</button>
    <button class="ctrl-btn" onclick="setMode('fractal')">Fractal Flow</button>
    <button class="ctrl-btn" onclick="setMode('glitch')">Data Glitch</button>
</div>

<div class="info-overlay" id="info">
    Mode: Noise Field<br>
    Operators: —<br>
    FPS: 60
</div>

<script>
// === WebGL Generative Engine ===
const canvas = document.getElementById('main');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');

let W, H, time = 0, mode = 'noise', mouseX = 0.5, mouseY = 0.5;
let params = { speed: 0.3, complexity: 0.4, intensity: 0.6, color: 0.5 };
let prevFrame = null, feedbackStrength = 0;
let fpsCounter = 0, fpsTime = 0, fpsDisplay = 60;

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    pCanvas.width = W; pCanvas.height = H;
    gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

// Mouse tracking
document.addEventListener('mousemove', e => {
    mouseX = e.clientX / W;
    mouseY = 1.0 - e.clientY / H;
});

// Param sliders
document.getElementById('p-speed').oninput = e => params.speed = e.target.value / 100;
document.getElementById('p-complexity').oninput = e => params.complexity = e.target.value / 100;
document.getElementById('p-intensity').oninput = e => params.intensity = e.target.value / 100;
document.getElementById('p-color').oninput = e => params.color = e.target.value / 100;

// === Shader programs ===
function createShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
    }
    return s;
}

function createProgram(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, createShader(vs, gl.VERTEX_SHADER));
    gl.attachShader(p, createShader(fs, gl.FRAGMENT_SHADER));
    gl.linkProgram(p);
    return p;
}

const vertSrc = `attribute vec2 pos;varying vec2 vUV;
void main(){vUV=pos*0.5+0.5;gl_Position=vec4(pos,0,1);}`;

const fragSrc = `
precision highp float;
varying vec2 vUV;
uniform float uTime,uSpeed,uComplexity,uIntensity,uHue,uMouseX,uMouseY;
uniform int uMode;
uniform sampler2D uPrev;
uniform float uFeedback;

#define PI 3.14159265

vec3 hsv2rgb(vec3 c){
    vec4 K=vec4(1.,2./3.,1./3.,3.);
    vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
    return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
}

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}

float noise(vec2 p){
    vec2 i=floor(p),f=fract(p);
    f=f*f*(3.-2.*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
               mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

float fbm(vec2 p,float oct){
    float v=0.,a=.5;
    mat2 rot=mat2(cos(.5),sin(.5),-sin(.5),cos(.5));
    for(float i=0.;i<8.;i++){
        if(i>=oct)break;
        v+=a*noise(p);
        p=rot*p*2.;
        a*=.5;
    }
    return v;
}

vec3 noiseField(vec2 uv){
    float t=uTime*uSpeed;
    vec2 p=uv*3.+t*0.3;
    float n=fbm(p+vec2(sin(t*0.2),cos(t*0.3)),uComplexity*8.);
    float n2=fbm(p*1.5+vec2(n),uComplexity*6.);
    float h=uHue+n*0.3;
    return hsv2rgb(vec3(h,0.7-n2*0.3,n*uIntensity*1.5))*uIntensity;
}

vec3 feedbackLoop(vec2 uv){
    float t=uTime*uSpeed;
    vec2 center=vec2(uMouseX,uMouseY);
    vec2 d=uv-center;
    float angle=atan(d.y,d.x)+t*0.2;
    float dist=length(d);

    vec2 warp=uv+vec2(sin(angle+t)*0.02,cos(angle*1.3+t)*0.02)*uIntensity;
    vec3 prev=texture2D(uPrev,warp*0.998+0.001).rgb*uFeedback;

    float n=fbm(uv*4.+t,uComplexity*6.);
    float ring=smoothstep(0.3,0.31,dist)*smoothstep(0.35,0.34,dist);
    vec3 fresh=hsv2rgb(vec3(uHue+dist+t*0.1,0.8,ring+n*0.15))*uIntensity;

    return prev+fresh;
}

vec3 waveInterference(vec2 uv){
    float t=uTime*uSpeed*2.;
    vec2 c1=vec2(uMouseX,uMouseY);
    vec2 c2=vec2(0.3+sin(t*0.3)*0.2,0.7+cos(t*0.4)*0.2);
    vec2 c3=vec2(0.7+cos(t*0.5)*0.2,0.3+sin(t*0.6)*0.2);

    float w1=sin(length(uv-c1)*uComplexity*60.-t*3.)*0.5+0.5;
    float w2=sin(length(uv-c2)*uComplexity*50.-t*2.5)*0.5+0.5;
    float w3=sin(length(uv-c3)*uComplexity*40.-t*2.)*0.5+0.5;

    float v=(w1+w2+w3)/3.;
    return hsv2rgb(vec3(uHue+v*0.4,0.6+v*0.4,v*uIntensity*1.5));
}

vec3 fractalFlow(vec2 uv){
    float t=uTime*uSpeed;
    vec2 p=(uv-0.5)*3.;
    vec2 z=p;
    float iter=0.;
    vec2 c=vec2(sin(t*0.2)*0.7+uMouseX*0.5-0.25,cos(t*0.15)*0.7+uMouseY*0.5-0.25);

    for(int i=0;i<64;i++){
        if(dot(z,z)>4.)break;
        z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+c;
        iter+=1.;
    }
    float v=iter/64.;
    v=pow(v,0.5)*uIntensity;
    return hsv2rgb(vec3(uHue+v*0.5+t*0.05,0.8,v));
}

vec3 dataGlitch(vec2 uv){
    float t=uTime*uSpeed;
    vec2 p=uv;

    float block=floor(p.y*20.+t*2.)/20.;
    float glitchLine=step(0.95,hash(vec2(block,floor(t*8.))));
    p.x+=glitchLine*hash(vec2(block,t))*0.3*uIntensity;

    float n=fbm(p*vec2(2.,8.)+t,uComplexity*6.);
    float scan=sin(p.y*800.+t*20.)*0.02;
    float bars=step(0.5,fract(p.y*100.))*0.03;

    vec3 col;
    col.r=fbm(p*3.+0.1+t*0.5,4.);
    col.g=fbm(p*3.+0.2+t*0.5,4.);
    col.b=fbm(p*3.+0.3+t*0.5,4.);

    col=mix(col,hsv2rgb(vec3(uHue,1.,1.)),glitchLine*0.8);
    col+=scan+bars*uIntensity;
    col*=1.-length(uv-0.5)*0.5;

    return col*uIntensity*1.5;
}

void main(){
    vec2 uv=vUV;
    vec3 col=vec3(0.);

    if(uMode==0) col=noiseField(uv);
    else if(uMode==1) col=feedbackLoop(uv);
    else if(uMode==2) col=noiseField(uv)*0.5;
    else if(uMode==3) col=waveInterference(uv);
    else if(uMode==4) col=fractalFlow(uv);
    else if(uMode==5) col=dataGlitch(uv);

    // Vignette
    float vig=1.-dot((uv-0.5)*1.2,(uv-0.5)*1.2);
    col*=vig;

    // Slight grain
    col+=hash(uv*uTime)*0.02;

    gl_FragColor=vec4(col,1.);
}`;

const prog = createProgram(vertSrc, fragSrc);
const posLoc = gl.getAttribLocation(prog, 'pos');
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

// Framebuffers for feedback
function createFBO() {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    return { fbo, tex };
}

let fboA = createFBO(), fboB = createFBO(), fboPing = true;

// Uniforms
const uTime = gl.getUniformLocation(prog, 'uTime');
const uSpeed = gl.getUniformLocation(prog, 'uSpeed');
const uComplexity = gl.getUniformLocation(prog, 'uComplexity');
const uIntensity = gl.getUniformLocation(prog, 'uIntensity');
const uHue = gl.getUniformLocation(prog, 'uHue');
const uMode = gl.getUniformLocation(prog, 'uMode');
const uMouseX = gl.getUniformLocation(prog, 'uMouseX');
const uMouseY = gl.getUniformLocation(prog, 'uMouseY');
const uPrev = gl.getUniformLocation(prog, 'uPrev');
const uFeedback = gl.getUniformLocation(prog, 'uFeedback');

// === Particles ===
const NUM_PARTICLES = 600;
const particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: 0, vy: 0,
        size: Math.random() * 2 + 0.5,
        life: Math.random(),
        hue: Math.random(),
    });
}

function updateParticles() {
    pCtx.clearRect(0, 0, W, H);
    if (mode !== 'particles' && mode !== 'feedback') return;

    const cx = mouseX * W, cy = (1 - mouseY) * H;
    const spd = params.speed * 4;
    const inten = params.intensity;

    particles.forEach(p => {
        const dx = cx - p.x, dy = cy - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 1;
        const force = mode === 'particles' ? 200 / dist : 80 / dist;

        p.vx += (dx / dist) * force * 0.01 * spd;
        p.vy += (dy / dist) * force * 0.01 * spd;

        // Noise-like turbulence
        p.vx += (Math.sin(p.y * 0.01 + time * spd) * 0.5) * inten;
        p.vy += (Math.cos(p.x * 0.01 + time * spd) * 0.5) * inten;

        p.vx *= 0.96;
        p.vy *= 0.96;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.001;

        if (p.life <= 0 || p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
            p.x = cx + (Math.random() - 0.5) * 200;
            p.y = cy + (Math.random() - 0.5) * 200;
            p.vx = (Math.random() - 0.5) * 4;
            p.vy = (Math.random() - 0.5) * 4;
            p.life = 1;
            p.hue = params.color + Math.random() * 0.2;
        }

        const alpha = p.life * inten * 0.8;
        const hue = (p.hue + params.color) * 360;
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        const sz = p.size * (1 + speed * 0.3);

        pCtx.beginPath();
        pCtx.arc(p.x, p.y, sz, 0, Math.PI * 2);
        pCtx.fillStyle = `hsla(${hue}, 80%, 65%, ${alpha})`;
        pCtx.fill();

        // Trail
        if (speed > 1) {
            pCtx.beginPath();
            pCtx.moveTo(p.x, p.y);
            pCtx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
            pCtx.strokeStyle = `hsla(${hue}, 80%, 65%, ${alpha * 0.3})`;
            pCtx.lineWidth = sz * 0.5;
            pCtx.stroke();
        }
    });
}

// === Mode switching ===
const MODES = { noise: 0, feedback: 1, particles: 2, waves: 3, fractal: 4, glitch: 5 };
const MODE_LABELS = {
    noise: 'Noise Field', feedback: 'Feedback Loop', particles: 'Particle Storm',
    waves: 'Wave Interference', fractal: 'Fractal Flow', glitch: 'Data Glitch',
};
const MODE_OPS = {
    noise: 'Noise TOP → Level TOP → Null TOP',
    feedback: 'Feedback TOP → Composite TOP → Transform TOP → Level TOP',
    particles: 'POP Generate → POP Force → POP Noise → POP Render',
    waves: 'Noise CHOP → Math CHOP → CHOP to TOP → Composite TOP',
    fractal: 'GLSL TOP → Level TOP → Null TOP',
    glitch: 'Movie File In TOP → GLSL TOP → Composite TOP → Null TOP',
};

function setMode(m) {
    mode = m;
    feedbackStrength = m === 'feedback' ? 0.95 : 0;
    document.getElementById('mode-label').textContent = MODE_LABELS[m];
    document.querySelectorAll('.ctrl-btn').forEach((btn, i) => {
        btn.classList.toggle('active', Object.keys(MODES)[i] === m);
    });
    // Notify API
    fetch('/api/project/clear', { method: 'POST' }).then(() => {
        const templateMap = {
            noise: null, feedback: 'feedback-loop', particles: 'particle-system',
            waves: 'audio-reactive', fractal: 'glsl-shader', glitch: 'video-mixer',
        };
        const t = templateMap[m];
        if (t) {
            fetch('/api/net/template', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ template: t }),
            });
        }
    });
}

// === Render loop ===
function render(now) {
    const dt = 1 / 60;
    time += dt;

    // FPS
    fpsCounter++;
    if (now - fpsTime > 1000) {
        fpsDisplay = fpsCounter;
        fpsCounter = 0;
        fpsTime = now;
    }

    // Feedback ping-pong
    const src = fboPing ? fboA : fboB;
    const dst = fboPing ? fboB : fboA;

    // Render to dst FBO
    gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, src.tex);
    gl.uniform1i(uPrev, 0);

    gl.uniform1f(uTime, time);
    gl.uniform1f(uSpeed, params.speed);
    gl.uniform1f(uComplexity, params.complexity);
    gl.uniform1f(uIntensity, params.intensity);
    gl.uniform1f(uHue, params.color);
    gl.uniform1f(uMouseX, mouseX);
    gl.uniform1f(uMouseY, mouseY);
    gl.uniform1f(uFeedback, feedbackStrength);
    gl.uniform1i(uMode, MODES[mode] || 0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // Copy to screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.bindTexture(gl.TEXTURE_2D, dst.tex);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    fboPing = !fboPing;

    // Particles
    updateParticles();

    // Info
    document.getElementById('info').innerHTML =
        `Mode: ${MODE_LABELS[mode]}<br>` +
        `Chain: ${MODE_OPS[mode]}<br>` +
        `FPS: ${fpsDisplay}`;

    requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
